# Databricks Apps configuration for the Seqwater AI Command Centre.
# https://docs.databricks.com/aws/en/dev-tools/databricks-apps/configuration.html
#
# This file is GENERATED from app.template.yaml by scripts/deploy_app.py at
# deploy time. Edit the template, not this file.
#
# Resources (sql-warehouse, llm-endpoint, supervisor-endpoint, ka-endpoint,
# genie-space) are bound to the app at create time via
# `databricks apps create/update --json @databricks/app_create.json`.
# `valueFrom: <alias>` resolves to the id/name of the bound resource at runtime.

command:
  - "uvicorn"
  - "backend.main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: APP_MODE
    value: "databricks"
  - name: DATABRICKS_CATALOG
    value: "${DATABRICKS_CATALOG}"
  - name: DATABRICKS_SCHEMA
    value: "${DATABRICKS_SCHEMA}"
  - name: DATABRICKS_VOLUME
    value: "${DATABRICKS_VOLUME}"
  # The workspace organisation id is required by the Genie embed iframe URL
  # (the ?o=<workspace_id> query param). Databricks Apps auto-injects
  # DATABRICKS_HOST but not DATABRICKS_WORKSPACE_ID, so we set it explicitly
  # from the workspace metadata captured at deploy time.
  - name: DATABRICKS_WORKSPACE_ID
    value: "${DATABRICKS_WORKSPACE_ID}"
  - name: DATABRICKS_LLM_ENDPOINT
    valueFrom: "llm-endpoint"
  - name: DATABRICKS_LLM_TEMPERATURE
    value: "0.1"
  - name: DATABRICKS_LLM_MAX_TOKENS
    value: "2048"
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: "sql-warehouse"
  - name: DEMO_SEED
    value: "20260529"
  - name: DEMO_TIMEZONE
    value: "Australia/Brisbane"
  - name: SYNTHETIC_DATA_DIR
    value: "data/synthetic"
  - name: DOCUMENTS_DIR
    value: "data/documents"
  # The next three resource bindings are present in app_create.json only when
  # the corresponding Agent Bricks have been provisioned. The Apps runtime
  # silently ignores valueFrom references whose resource is unbound, so it is
  # safe to keep these declarations even on a partial deployment.
  - name: DATABRICKS_SUPERVISOR_ENDPOINT
    valueFrom: "supervisor-endpoint"
  - name: DATABRICKS_KA_ENDPOINT
    valueFrom: "ka-endpoint"
  - name: DATABRICKS_GENIE_SPACE_ID
    valueFrom: "genie-space"
